<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap - adhyaAI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .timeline {
      position: relative;
      margin: 40px 0;
      padding-left: 30px;
      border-left: 3px solid var(--border);
    }
    .timeline-item {
      position: relative;
      margin-bottom: 32px;
      padding: 24px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .timeline-item:hover {
      transform: translateX(4px);
      box-shadow: var(--shadow-md);
      border-color: rgba(255, 87, 34, 0.3);
    }
    .timeline-dot {
      position: absolute;
      left: -65px;
      top: 24px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: var(--accent);
      border: 4px solid var(--bg-primary);
      box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.1);
    }
  </style>
</head>
<body>

  <!-- Navbar is injected by app.js -->

  <main class="container section">
    <div class="fade-in-up">
      <div class="flex justify-between items-center mb-4" style="flex-wrap: wrap; gap: 16px;">
        <h1 id="roadmap-title">🧭 Career Roadmap</h1>
        <button class="btn btn-secondary" onclick="shareRoadmap()">
          <span style="color: #25D366; margin-right: 8px;">WhatsApp</span> Share Plan
        </button>
      </div>

      <!-- NEW: Career Overview Section -->
      <div class="card mb-5" style="border-left: 4px solid var(--accent);">
        <h2 class="mb-3 text-accent" style="font-size: 20px;">The Honest Truth About This Career</h2>
        <div class="grid grid-2" style="gap: 32px;">
          <div>
            <h4 class="mb-2 text-secondary" style="font-size: 14px; text-transform: uppercase;">What it actually looks like</h4>
            <p id="career-looks-like" style="font-size: 15px; line-height: 1.6;"></p>
          </div>
          <div>
            <h4 class="mb-2 text-secondary" style="font-size: 14px; text-transform: uppercase;">The Reality & Difficulty</h4>
            <p id="career-reality" style="font-size: 15px; line-height: 1.6;"></p>
            <div class="mt-2">
              <span class="tag" id="career-difficulty" style="font-size: 12px;"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 40px;">
        <!-- Left Col: Timeline -->
        <div>
          <div class="card" style="background-color: var(--bg-secondary); border: none;">
            <h2 class="mb-2">Your Journey Timeline</h2>
            <p class="text-secondary mb-4">Step-by-step guidance curated for your specific goal.</p>
            <div id="timeline-container" class="timeline">
              <!-- Rendered via JS -->
            </div>
          </div>
        </div>

        <!-- Right Col: Suggestions -->
        <div>
          <div class="card mb-4">
            <h3 class="mb-3">Curated Playbooks</h3>
            <div id="recommended-playbooks" class="flex flex-col gap-3">
              <!-- JS -->
            </div>
            <a href="playbooks.html" class="text-accent mt-3" style="display: inline-block; font-weight: 700;">View All Playbooks →</a>
          </div>

          <div class="card">
            <h3 class="mb-3">Essential Skills</h3>
            <div id="recommended-skills" class="flex flex-col gap-3">
              <!-- JS -->
            </div>
            <a href="skill-builder.html" class="text-accent mt-3" style="display: inline-block; font-weight: 700;">Go to Skill Builder →</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = App.getUser();
      if (!user) {
        window.location.href = 'onboarding.html';
        return;
      }

      const careerName = CAREERS[user.career] || CAREERS['default'];
      document.getElementById('roadmap-title').innerText = `🧭 ${user.name}'s Roadmap — ${careerName}`;

      // Set Career Overview
      const overview = CAREER_OVERVIEWS[user.career] || CAREER_OVERVIEWS['default'];
      document.getElementById('career-looks-like').innerText = overview.looks_like;
      document.getElementById('career-reality').innerText = overview.reality;
      
      const diffTag = document.getElementById('career-difficulty');
      diffTag.innerText = `Difficulty: ${overview.difficulty}`;
      if(overview.difficulty.includes('Extremely')) {
        diffTag.style.backgroundColor = '#fef2f2';
        diffTag.style.color = '#dc2626';
        diffTag.style.borderColor = '#fca5a5';
      }

      // Get roadmap data
      let roadmapKey = `${user.career}-${user.class}`;
      let roadmapData = ROADMAPS[roadmapKey];
      
      // Fallbacks
      if (!roadmapData && user.class.includes('science')) roadmapData = ROADMAPS[`${user.career}-11-science`];
      if (!roadmapData) roadmapData = ROADMAPS[`${user.career}-10`];
      if (!roadmapData) roadmapData = ROADMAPS['default'];

      // Render timeline
      const timelineContainer = document.getElementById('timeline-container');
      let timelineHTML = '';
      roadmapData.phases.forEach((phase, index) => {
        timelineHTML += `
          <div class="timeline-item">
            <div class="timeline-dot" style="${index === 0 ? 'background-color: var(--success); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);' : ''}"></div>
            <div class="flex justify-between items-start mb-2">
              <h4 style="font-size: 18px;">${phase.title}</h4>
              <span class="tag" style="font-size: 11px; padding: 4px 10px; background-color: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border);">${phase.difficulty}</span>
            </div>
            <p class="text-secondary mb-3" style="font-size: 15px;">${phase.desc}</p>
            <div style="background-color: #fff0eb; border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 8px 8px 0;">
              <span style="font-weight: 700; color: var(--accent); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">Action Step</span><br>
              <span style="font-size: 14px; font-weight: 500;">${phase.action}</span>
            </div>
          </div>
        `;
      });
      timelineContainer.innerHTML = timelineHTML;

      // Recommended Playbooks
      const playbooksContainer = document.getElementById('recommended-playbooks');
      let playbooksHTML = '';
      PLAYBOOKS.slice(0, 2).forEach(pb => {
        playbooksHTML += `
          <a href="playbook-detail.html?id=${pb.id}" style="padding: 16px; border: 1px solid var(--border); border-radius: 8px; transition: border-color 0.2s; display: block;">
            <div class="font-bold mb-1" style="color: var(--text-primary);">${pb.title}</div>
            <div class="tag ${pb.subjectTag}" style="font-size: 11px; padding: 2px 8px;">${pb.subject} - Class ${pb.class}</div>
          </a>
        `;
      });
      playbooksContainer.innerHTML = playbooksHTML;

      // Recommended Skills
      const skillsContainer = document.getElementById('recommended-skills');
      let skillsData = SKILLS[user.career] || SKILLS['default'];
      let skillsHTML = '';
      skillsData.slice(0, 2).forEach(skill => {
        skillsHTML += `
          <div style="padding: 16px; border: 1px solid var(--border); border-radius: 8px;">
            <div class="font-bold mb-1" style="font-size: 15px;">${skill.name}</div>
            <div class="text-secondary" style="font-size: 13px;">${skill.time}</div>
          </div>
        `;
      });
      skillsContainer.innerHTML = skillsHTML;
    });

    function shareRoadmap() {
      const user = App.getUser();
      const text = `Hey! I just created my personalized career roadmap for ${CAREERS[user.career]} on adhyaAI. It's an excellent free platform for student guidance. Check it out!`;
      const encoded = encodeURIComponent(text);
      window.open(`https://wa.me/?text=${encoded}`, '_blank');
    }
  </script>
</body>
</html>
