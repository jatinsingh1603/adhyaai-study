<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playbook Reader - adhyaAI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .pb-section {
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .pb-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .mcq-option {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      background-color: var(--bg-secondary);
    }
    .mcq-option:hover {
      border-color: var(--accent);
      background-color: white;
    }
    .mcq-option.correct {
      background-color: #ecfdf5;
      border-color: var(--success);
      color: #065f46;
    }
    .mcq-option.wrong {
      background-color: #fef2f2;
      border-color: #ef4444;
      color: #991b1b;
    }
    .playbook-content-wrapper {
      padding: 48px;
    }
    @media (max-width: 768px) {
      .playbook-content-wrapper { padding: 24px; }
    }
    
    /* AI Doubt Chat Panel */
    .ai-doubt-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background-color: var(--accent);
      color: white;
      padding: 16px 24px;
      border-radius: 30px;
      font-weight: 700;
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
    }
    .ai-doubt-btn:hover { transform: scale(1.05); }
    
    .ai-chat-panel {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 360px;
      height: 500px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ai-chat-panel.active {
      transform: translateY(0);
      opacity: 1;
      pointer-events: all;
    }
    @media (max-width: 400px) {
      .ai-chat-panel { width: calc(100% - 48px); }
    }
  </style>
</head>
<body style="background-color: var(--bg-secondary);">

  <!-- Progress fixed top -->
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 6px; z-index: 200; background: var(--border);">
    <div id="scroll-progress" style="height: 100%; width: 0%; background-color: var(--accent); border-radius: 0 4px 4px 0;"></div>
  </div>

  <main class="container section">
    <div class="fade-in-up" style="max-width: 800px; margin: 0 auto;">
      
      <div class="flex justify-between items-center mb-6">
        <a href="playbooks.html" class="font-bold text-secondary hover:text-accent transition">← Back to Library</a>
        <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 13px;" onclick="downloadOffline()">⬇ Save for Offline Reading</button>
      </div>

      <div id="playbook-header" class="mb-6 text-center">
        <!-- JS -->
      </div>

      <div class="card playbook-content-wrapper" id="playbook-content" style="border: none;">
        <!-- JS -->
      </div>
      
      <div id="completion-state" class="mt-6 text-center hidden fade-in-up">
        <div class="card" style="background-color: #ecfdf5; border-color: var(--success); border-width: 2px;">
          <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
          <h3 class="text-success mb-2" style="font-size: 24px;">Congratulations!</h3>
          <p class="mb-4 font-bold" style="color: #065f46;">You have successfully mastered this playbook concept.</p>
          <div>
            <a href="playbooks.html" class="btn btn-primary">Explore More Playbooks</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- AI Doubt Floating Interface -->
  <div class="ai-doubt-btn" onclick="toggleChat()">
    <span style="font-size: 20px;">🤖</span> Ask AI a Doubt
  </div>

  <div class="ai-chat-panel" id="ai-chat-panel">
    <div class="ai-header" style="justify-content: space-between;">
      <div class="flex items-center gap-2">
        <span style="font-size: 18px;">🤖</span> Topic Q&A
      </div>
      <button style="background: none; border: none; color: white; cursor: pointer; font-size: 20px;" onclick="toggleChat()">×</button>
    </div>
    
    <div class="ai-messages" id="chat-messages" style="flex: 1; border-bottom: 1px solid var(--border);">
      <div class="ai-message bot">
        Hi! Have a doubt about this topic? Ask me anything and I'll explain it in simple terms.
      </div>
    </div>

    <div class="ai-input-area" style="flex-direction: column;">
      <div class="flex gap-2 w-full">
        <input type="text" id="chat-input" placeholder="Type your doubt here..." style="margin: 0; flex: 1; font-size: 14px; padding: 10px;" onkeypress="if(event.key === 'Enter') sendDoubt()">
        <button class="btn btn-primary" style="padding: 10px 16px;" onclick="sendDoubt()">Send</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    let currentPb = null;
    let questionsAnswered = 0;

    function getParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const pbId = getParam('id');
      if (!pbId) {
        document.getElementById('playbook-content').innerHTML = "<div class='text-center'>Playbook not found.</div>";
        return;
      }

      currentPb = PLAYBOOKS.find(p => p.id === pbId);
      
      // Check offline storage if not found in data
      if (!currentPb) {
        const offlineData = JSON.parse(localStorage.getItem('adhyaai_offline') || "{}");
        currentPb = offlineData[pbId];
      }

      if (!currentPb) {
        document.getElementById('playbook-content').innerHTML = "<div class='text-center'>Playbook not found.</div>";
        return;
      }

      // Record as read
      const progress = App.getProgress();
      if (!progress.playbooks_read.includes(pbId)) {
        progress.playbooks_read.push(pbId);
        App.saveProgress(progress);
      }

      renderPlaybook(currentPb);
      
      // Scroll progress
      window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById('scroll-progress').style.width = scrolled + "%";
      });
    });

    function renderPlaybook(pb) {
      // Header
      document.getElementById('playbook-header').innerHTML = `
        <div class="flex items-center justify-center gap-3 mb-4">
          <span class="tag ${pb.subjectTag}">${pb.subject}</span>
          <span class="text-secondary font-bold" style="font-size: 14px;">Class ${pb.class}</span>
          <span class="text-secondary font-bold" style="font-size: 14px;">• ~${pb.readTime}</span>
        </div>
        <h1 style="font-size: 48px; letter-spacing: -1px;">${pb.title}</h1>
      `;

      // Content
      let contentHTML = `
        <div class="pb-section">
          <h2 class="mb-3 text-accent flex items-center gap-2"><span style="font-size: 24px;">🧠</span> Simple Explanation</h2>
          <p style="font-size: 18px; line-height: 1.8; color: var(--text-primary); font-weight: 500;">${pb.content.seedhaSamjho}</p>
        </div>
        
        <div class="pb-section">
          <h2 class="mb-3 flex items-center gap-2"><span style="font-size: 24px;">📚</span> Formal Definition</h2>
          <div style="background-color: var(--bg-secondary); border-left: 4px solid var(--accent); padding: 20px; border-radius: 0 8px 8px 0;">
            <p style="font-style: italic; font-size: 16px; color: var(--text-secondary);">${pb.content.formal}</p>
          </div>
        </div>

        <div class="pb-section">
          <h2 class="mb-3 flex items-center gap-2"><span style="font-size: 24px;">🌍</span> Real World Application</h2>
          <p style="font-size: 16px; line-height: 1.7;">${pb.content.realLife}</p>
        </div>

        <div class="pb-section">
          <h2 class="mb-3 flex items-center gap-2"><span style="font-size: 24px;">💡</span> Practical Example</h2>
          <div class="card" style="background-color: #fffaf9; border-color: rgba(255, 87, 34, 0.2); box-shadow: none;">
            <p style="font-size: 16px; line-height: 1.7; font-weight: 600;">${pb.content.example}</p>
          </div>
        </div>

        <div class="pb-section">
          <h2 class="mb-3 flex items-center gap-2"><span style="font-size: 24px;">📝</span> Board Exam Patterns</h2>
          <p class="mb-4" style="font-size: 16px;">${pb.content.boardExam}</p>
          <h4 class="mb-3">Previous Year Questions:</h4>
          <ul style="list-style-type: none; padding-left: 0;">
            ${pb.content.pyq.map(q => `
              <li class="mb-2" style="background: var(--bg-secondary); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); font-size: 15px;">
                ${q}
              </li>
            `).join('')}
          </ul>
        </div>

        <div class="pb-section">
          <h2 class="mb-3 flex items-center gap-2"><span style="font-size: 24px;">✅</span> Knowledge Check</h2>
          <p class="text-secondary mb-4">Test your understanding of this topic. Tap the correct answer below.</p>
          <div id="mcq-container">
      `;

      pb.content.quickCheck.forEach((qObj, index) => {
        contentHTML += `
          <div class="mb-5">
            <p style="font-weight: 700; font-size: 16px;" class="mb-3">Q${index + 1}. ${qObj.q}</p>
            <div>
              ${qObj.options.map((opt, optIdx) => `
                <div class="mcq-option" onclick="checkAnswer(this, ${index}, ${optIdx}, ${qObj.ans})">
                  ${opt}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      contentHTML += `</div></div>`;
      document.getElementById('playbook-content').innerHTML = contentHTML;

      // Check if already completed
      const progress = App.getProgress();
      if (progress.playbooks_completed.includes(pb.id)) {
        document.getElementById('completion-state').classList.remove('hidden');
      }
    }

    function checkAnswer(element, qIndex, selectedIdx, correctIdx) {
      if (element.parentElement.querySelector('.correct')) return;

      const options = element.parentElement.querySelectorAll('.mcq-option');
      
      if (selectedIdx === correctIdx) {
        element.classList.add('correct');
        element.innerHTML += ' <span style="float: right;">✔️ Correct</span>';
        questionsAnswered++;
        
        if (questionsAnswered === currentPb.content.quickCheck.length) {
          const progress = App.getProgress();
          if (!progress.playbooks_completed.includes(currentPb.id)) {
            progress.playbooks_completed.push(currentPb.id);
            App.saveProgress(progress);
          }
          document.getElementById('completion-state').classList.remove('hidden');
          
          setTimeout(() => {
            document.getElementById('completion-state').scrollIntoView({ behavior: 'smooth' });
          }, 500);
        }
      } else {
        element.classList.add('wrong');
        element.innerHTML += ' <span style="float: right;">❌ Incorrect</span>';
      }
    }

    function downloadOffline() {
      if (!currentPb) return;
      const offlineData = JSON.parse(localStorage.getItem('adhyaai_offline') || "{}");
      offlineData[currentPb.id] = currentPb;
      localStorage.setItem('adhyaai_offline', JSON.stringify(offlineData));
      alert('Playbook successfully saved for offline reading!');
    }

    // AI Chat Logic
    let isTyping = false;
    function toggleChat() {
      document.getElementById('ai-chat-panel').classList.toggle('active');
    }

    function sendDoubt() {
      if(isTyping) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if(!text) return;

      const chatBox = document.getElementById('chat-messages');
      
      // User Message
      const userMsg = document.createElement('div');
      userMsg.className = 'ai-message user';
      userMsg.innerText = text;
      chatBox.appendChild(userMsg);
      
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Typing Indicator
      const typing = document.createElement('div');
      typing.className = 'ai-message bot typing-indicator';
      typing.innerHTML = '<span></span><span></span><span></span>';
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      isTyping = true;

      // Simulate AI processing and response
      setTimeout(() => {
        chatBox.removeChild(typing);
        const botMsg = document.createElement('div');
        botMsg.className = 'ai-message bot';
        
        const lowerText = text.toLowerCase();
        
        if(currentPb.id.includes('photosynthesis')) {
          if(lowerText.includes('equation') || lowerText.includes('formula')) {
            botMsg.innerText = "The equation is: 6CO2 + 6H2O + Light Energy → C6H12O6 + 6O2. Simply put: Carbon dioxide + Water + Sunlight makes Glucose + Oxygen!";
          } else {
            botMsg.innerText = "Photosynthesis literally means 'putting together with light'. Plants are just tiny solar-powered food factories. Does that clear it up, or should I explain another part?";
          }
        } else if(currentPb.id.includes('motion')) {
          if(lowerText.includes('first law') || lowerText.includes('inertia')) {
            botMsg.innerText = "Think of inertia as 'laziness'. An object wants to keep doing whatever it's already doing. If it's resting, it wants to stay resting. If it's moving, it wants to keep moving!";
          } else {
            botMsg.innerText = "Newton's laws basically explain why things move or stop. The core idea is that forces (pushes or pulls) cause changes in motion. Which specific law is confusing you?";
          }
        } else {
          botMsg.innerText = "That's a great question about " + currentPb.title + "! I can help you break it down further. What specifically is confusing you?";
        }
        
        chatBox.appendChild(botMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
        isTyping = false;
      }, 1500);
    }
  </script>
</body>
</html>
